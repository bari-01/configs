# family = "Iosevka Fixed Curly Slab"
# style = "Bold Italic"
# 
# [font.italic]
# family = "Iosevka Fixed Curly Slab"
# style = "Italic"

[font.normal]
family = "Jetbrains Mono Nerd Font"
