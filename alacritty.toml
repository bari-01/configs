[font]
size = 11.0

[env]
TERM = "xterm-256color"

[colors.primary]
background = "#161B20"
foreground = "#CCDBD5"

[colors.cursor]
text = "#161B20"
cursor = "#CCDBD5"

[colors.selection]
text = "#3A4857"
background = "#D5E4F7"

[colors.normal]
black   = "#161B20"
red     = "#A874FF"
green   = "#63DEDA"
yellow  = "#75FCDD"
blue    = "#7EB2CB"
magenta = "#AAA1ED"
cyan    = "#82D7E3"
white   = "#CCDBD5"

[colors.bright]
black   = "#B1BCB5"
red     = "#D0B2FF"
green   = "#F4FFFE"
yellow  = "#FFFFFF"
blue    = "#C0E2EC"
magenta = "#DDD4FF"
cyan    = "#EDFDFF"
white   = "#D3E4FA"

